<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chaos Maker Test App</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
    section { margin-bottom: 20px; padding: 12px; border: 1px solid #ddd; border-radius: 4px; }
    button { margin: 4px; padding: 6px 12px; }
    pre { background: #f5f5f5; padding: 10px; overflow-x: auto; min-height: 1em; }
  </style>
</head>
<body>
  <h1>Chaos Maker Test App</h1>

  <!-- Network: Fetch API -->
  <section>
    <h2>Fetch API</h2>
    <button id="fetch-data">Fetch GET</button>
    <button id="fetch-post">Fetch POST</button>
    <div id="status"></div>
    <div id="timing"></div>
    <pre id="result"></pre>
  </section>

  <!-- Network: XHR -->
  <section>
    <h2>XMLHttpRequest</h2>
    <button id="xhr-get">XHR GET</button>
    <div id="xhr-status"></div>
    <pre id="xhr-result"></pre>
  </section>

  <!-- UI Elements for assault testing -->
  <section>
    <h2>UI Elements</h2>
    <button id="submit-btn">Submit</button>
    <button id="action-btn">Action</button>
    <a id="nav-link" href="#">Navigate</a>
    <div id="removable-div">Removable Content</div>
    <button id="add-dynamic">Add Dynamic Element</button>
    <div id="dynamic-container"></div>
  </section>

  <script>
    var API_URL = '/api/data.json';

    // --- Fetch GET ---
    document.getElementById('fetch-data').addEventListener('click', function () {
      var statusEl = document.getElementById('status');
      var resultEl = document.getElementById('result');
      var timingEl = document.getElementById('timing');
      statusEl.textContent = 'Loading...';
      resultEl.textContent = '';
      timingEl.textContent = '';

      var start = Date.now();
      fetch(API_URL)
        .then(function (response) {
          var elapsed = Date.now() - start;
          timingEl.textContent = elapsed + 'ms';
          if (!response.ok) {
            throw new Error('API Error: ' + response.status);
          }
          return response.text();
        })
        .then(function (text) {
          resultEl.textContent = text;
          try {
            JSON.parse(text);
            statusEl.textContent = 'Success!';
          } catch (e) {
            statusEl.textContent = 'Parse Error!';
          }
        })
        .catch(function (error) {
          var elapsed = Date.now() - start;
          timingEl.textContent = elapsed + 'ms';
          statusEl.textContent = 'Error!';
          resultEl.textContent = 'Failed: ' + error.message;
        });
    });

    // --- Fetch POST ---
    document.getElementById('fetch-post').addEventListener('click', function () {
      var statusEl = document.getElementById('status');
      var resultEl = document.getElementById('result');
      statusEl.textContent = 'Loading...';
      resultEl.textContent = '';

      fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: 'test', completed: false })
      })
        .then(function (response) {
          if (!response.ok) {
            throw new Error('API Error: ' + response.status);
          }
          return response.text();
        })
        .then(function (text) {
          resultEl.textContent = text;
          statusEl.textContent = 'Success!';
        })
        .catch(function (error) {
          statusEl.textContent = 'Error!';
          resultEl.textContent = 'Failed: ' + error.message;
        });
    });

    // --- XHR GET ---
    document.getElementById('xhr-get').addEventListener('click', function () {
      var statusEl = document.getElementById('xhr-status');
      var resultEl = document.getElementById('xhr-result');
      statusEl.textContent = 'Loading...';
      resultEl.textContent = '';

      var xhr = new XMLHttpRequest();
      xhr.open('GET', API_URL);

      xhr.addEventListener('load', function () {
        if (xhr.status >= 200 && xhr.status < 300) {
          statusEl.textContent = 'Success!';
          resultEl.textContent = xhr.responseText;
        } else {
          statusEl.textContent = 'Error!';
          resultEl.textContent = 'XHR Error: ' + xhr.status;
        }
      });

      xhr.addEventListener('error', function () {
        statusEl.textContent = 'Error!';
        resultEl.textContent = 'Network Error';
      });

      xhr.addEventListener('abort', function () {
        statusEl.textContent = 'Aborted!';
        resultEl.textContent = 'Request aborted';
      });

      xhr.send();
    });

    // --- Add Dynamic Element ---
    document.getElementById('add-dynamic').addEventListener('click', function () {
      var container = document.getElementById('dynamic-container');
      var btn = document.createElement('button');
      btn.className = 'dynamic-btn';
      btn.textContent = 'Dynamic Button';
      container.appendChild(btn);
    });
  </script>
</body>
</html>
