name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure tag is on main
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install Dependencies
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Unit Tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('e2e-tests/playwright/package.json') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter e2e-tests-playwright exec playwright install --with-deps

      - name: Install Playwright System Dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter e2e-tests-playwright exec playwright install-deps

      - name: Playwright E2E Tests
        run: pnpm --filter e2e-tests-playwright test

      - name: Cache Cypress Binary
        id: cypress-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Cypress Binary
        if: steps.cypress-cache.outputs.cache-hit != 'true'
        run: pnpm --filter e2e-tests-cypress exec cypress install

      - name: Cypress E2E Tests
        run: pnpm --filter e2e-tests-cypress exec cypress run --browser chrome

      - name: WebdriverIO E2E Tests
        env:
          WDIO_BROWSER: chrome
        run: pnpm --filter e2e-tests-webdriverio test

      - name: Cache Puppeteer Chrome
        id: puppeteer-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ hashFiles('e2e-tests/puppeteer/package.json', 'pnpm-lock.yaml') }}

      - name: Install Puppeteer Chrome
        if: steps.puppeteer-cache.outputs.cache-hit != 'true'
        run: pnpm --filter e2e-tests-puppeteer exec puppeteer browsers install chrome

      - name: Puppeteer E2E Tests
        run: pnpm --filter e2e-tests-puppeteer test

  publish-core:
    name: Publish @chaos-maker/core
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Core
        run: pnpm build:core

      - name: Publish Core
        run: pnpm --filter @chaos-maker/core publish --no-git-checks --access public

  publish-playwright:
    name: Publish @chaos-maker/playwright
    runs-on: ubuntu-latest
    needs: publish-core
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Playwright
        run: pnpm build:core && pnpm build:playwright

      - name: Publish Playwright Adapter
        run: pnpm --filter @chaos-maker/playwright publish --no-git-checks --access public

  publish-cypress:
    name: Publish @chaos-maker/cypress
    runs-on: ubuntu-latest
    needs: publish-core
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Cypress
        run: pnpm build:core && pnpm build:cypress

      - name: Publish Cypress Adapter
        run: pnpm --filter @chaos-maker/cypress publish --no-git-checks --access public

  publish-webdriverio:
    name: Publish @chaos-maker/webdriverio
    runs-on: ubuntu-latest
    needs: publish-core
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build WebdriverIO
        run: pnpm build:core && pnpm build:webdriverio

      - name: Publish WebdriverIO Adapter
        run: pnpm --filter @chaos-maker/webdriverio publish --no-git-checks --access public

  publish-puppeteer:
    name: Publish @chaos-maker/puppeteer
    runs-on: ubuntu-latest
    needs: publish-core
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Puppeteer
        run: pnpm build:core && pnpm build:puppeteer

      - name: Publish Puppeteer Adapter
        run: pnpm --filter @chaos-maker/puppeteer publish --no-git-checks --access public
