name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Cancel in-flight runs when a new commit lands on the same ref. Keeps PRs
# with rapid iteration from piling up duplicate runs; pushes to `main` still
# run independently because each push targets a different commit SHA ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint JS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Run ESLint
        run: pnpm lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Run Unit Tests
        run: pnpm test

  build:
    name: Build Core
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Build All Packages
        run: pnpm build

      - name: Report Bundle Size
        run: |
          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size | Gzipped |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|---------|" >> $GITHUB_STEP_SUMMARY
          for f in packages/core/dist/chaos-maker.js packages/core/dist/chaos-maker.cjs packages/core/dist/chaos-maker.umd.js; do
            if [ -f "$f" ]; then
              raw=$(wc -c < "$f" | tr -d ' ')
              gz=$(gzip -c "$f" | wc -c | tr -d ' ')
              name=$(basename "$f")
              echo "| \`$name\` | ${raw}B | ${gz}B |" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Archive Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chaos-maker-dist
          path: |
            packages/core/dist/
            packages/playwright/dist/

  e2e-test:
    name: E2E Tests (${{ matrix.project }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: chromium
            install: chromium
          - project: firefox
            install: firefox
          - project: webkit
            install: webkit
          # devices['Desktop Edge'] resolves to browserName=chromium + channel=msedge.
          # In headless mode that still launches via chromium_headless_shell, so we
          # must install both the msedge channel (system Edge) and the chromium
          # headless shell alongside it.
          - project: edge
            install: msedge chromium-headless-shell
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: chaos-maker-dist
          path: packages

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ matrix.project }}-${{ hashFiles('e2e-tests/playwright/package.json') }}

      - name: Install Playwright Browser (${{ matrix.install }})
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter e2e-tests-playwright exec playwright install --with-deps ${{ matrix.install }}

      - name: Install Playwright System Dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter e2e-tests-playwright exec playwright install-deps ${{ matrix.install }}

      - name: Run E2E Tests (${{ matrix.project }})
        run: pnpm --filter e2e-tests-playwright exec playwright test --project ${{ matrix.project }}
