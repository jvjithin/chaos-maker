name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Cancel in-flight runs when a new commit lands on the same ref. Keeps PRs
# with rapid iteration from piling up duplicate runs; pushes to `main` still
# run independently because each push targets a different commit SHA ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detects whether the diff touches anything outside the docs site so the
  # build / test / e2e jobs can short-circuit on docs-only PRs. The aggregator
  # `ci-success` job at the bottom accepts skipped results, so the required
  # status check is still satisfied without spinning up matrix browsers.
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Filter Paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            code:
              - '**'
              - '!docs/**'
              - '!.github/workflows/docs.yml'
            docs:
              - 'docs/**'
              - '.github/workflows/docs.yml'

  lint:
    name: Lint JS
    runs-on: ubuntu-latest
    # Lint always runs: catches docs/eslint config regressions and is
    # cheap (< 30s on this repo). Skipping it would let typo-level
    # regressions slip through on docs-only PRs that touch eslint config.
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run ESLint
        run: pnpm lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    # Runs in parallel with `lint` and `build` — none of the three reads
    # another's output. E2E jobs still gate on `build` for the dist artifact.
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run Unit Tests
        run: pnpm test

  build:
    name: Build Core
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    # Runs in parallel with `lint` and `test`. E2E jobs below consume the
    # dist artifact this produces.
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build All Packages
        run: pnpm build

      - name: Report Bundle Size
        run: |
          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size | Gzipped |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|---------|" >> $GITHUB_STEP_SUMMARY
          for f in packages/core/dist/chaos-maker.js packages/core/dist/chaos-maker.cjs packages/core/dist/chaos-maker.umd.js; do
            if [ -f "$f" ]; then
              raw=$(wc -c < "$f" | tr -d ' ')
              gz=$(gzip -c "$f" | wc -c | tr -d ' ')
              name=$(basename "$f")
              echo "| \`$name\` | ${raw}B | ${gz}B |" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Archive Build Artifact
        uses: actions/upload-artifact@v7
        with:
          name: chaos-maker-dist
          path: |
            packages/core/dist/
            packages/playwright/dist/
            packages/cypress/dist/
            packages/webdriverio/dist/
            packages/puppeteer/dist/

  docs-build:
    name: Docs Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Fetch tags
        run: git fetch --tags --force origin

      - name: Setup
        uses: ./.github/actions/setup
        with:
          frozen-lockfile: 'true'

      # Validates the branch's `docs/content-source/**` edits in addition to
      # the tag-driven archives. The published site is still tag-only — this
      # job's artifact is never deployed; it exists to fail PRs that break
      # docs syntax, frontmatter, or imports.
      - name: Build Docs (working tree + tags)
        run: pnpm --filter chaos-maker-docs run build:dev

      - name: Upload Docs Artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs-dist
          path: docs/dist/

  e2e-playwright:
    name: E2E Playwright (${{ matrix.project }})
    runs-on: ubuntu-latest
    needs: [build, changes]
    if: needs.changes.outputs.code == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: chromium
            install: chromium
          - project: firefox
            install: firefox
          - project: webkit
            install: webkit
          # devices['Desktop Edge'] resolves to browserName=chromium + channel=msedge.
          # In headless mode that still launches via chromium_headless_shell, so we
          # must install both the msedge channel (system Edge) and the chromium
          # headless shell alongside it.
          - project: edge
            install: msedge chromium-headless-shell
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Download Build Artifact
        uses: actions/download-artifact@v8
        with:
          name: chaos-maker-dist
          path: packages

      - name: Sync SW bundle into fixtures
        run: node scripts/sync-sw-fixtures.mjs

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ matrix.project }}-${{ hashFiles('e2e-tests/playwright/package.json') }}

      - name: Install Playwright Browser (${{ matrix.install }})
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter e2e-tests-playwright exec playwright install --with-deps ${{ matrix.install }}

      - name: Install Playwright System Dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter e2e-tests-playwright exec playwright install-deps ${{ matrix.install }}

      - name: Run E2E Tests (${{ matrix.project }})
        run: pnpm --filter e2e-tests-playwright exec playwright test --project ${{ matrix.project }}

  e2e-cypress:
    name: E2E Cypress (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: [build, changes]
    if: needs.changes.outputs.code == 'true'
    strategy:
      fail-fast: false
      matrix:
        # Chrome is pre-installed on ubuntu-latest runners.
        # Electron ships with the Cypress binary itself — no separate install.
        #
        # Firefox is intentionally excluded: Cypress 13.x's CDP-over-GeckoDriver
        # bridge is broken against Firefox 140+ on ubuntu-latest ("Failed to
        # spawn CDP with Firefox" → `getWindowHandles` of undefined). This is a
        # Cypress-infrastructure issue, not a chaos-maker one. Playwright's
        # firefox job still covers the Firefox browser engine end-to-end, and
        # chaos-maker core only touches standard Web Platform APIs that behave
        # identically across engines. Revisit after upgrading to Cypress 14.x,
        # which has better WebDriver BiDi support.
        #
        # WebKit isn't supported by Cypress at all (covered by Playwright).
        browser: [chrome, electron]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      # Restore Cypress binary cache before install so the cypress postinstall
      # hook reuses the cached binary instead of re-downloading.
      - name: Cache Cypress Binary
        id: cypress-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Setup
        uses: ./.github/actions/setup

      - name: Install Cypress Binary
        if: steps.cypress-cache.outputs.cache-hit != 'true'
        run: pnpm --filter e2e-tests-cypress exec cypress install

      - name: Download Build Artifact
        uses: actions/download-artifact@v8
        with:
          name: chaos-maker-dist
          path: packages

      - name: Sync SW bundle into fixtures
        run: node scripts/sync-sw-fixtures.mjs

      - name: Run Cypress E2E Tests (${{ matrix.browser }})
        run: pnpm --filter e2e-tests-cypress exec cypress run --browser ${{ matrix.browser }}

      - name: Upload Cypress Screenshots (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-screenshots-${{ matrix.browser }}
          path: e2e-tests/cypress/screenshots/
          if-no-files-found: ignore

  e2e-webdriverio:
    name: E2E WebdriverIO (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: [build, changes]
    if: needs.changes.outputs.code == 'true'
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Download Build Artifact
        uses: actions/download-artifact@v8
        with:
          name: chaos-maker-dist
          path: packages

      - name: Sync SW bundle into fixtures
        run: node scripts/sync-sw-fixtures.mjs

      - name: Run WebdriverIO E2E Tests (${{ matrix.browser }})
        env:
          WDIO_BROWSER: ${{ matrix.browser }}
        run: pnpm --filter e2e-tests-webdriverio test

  e2e-puppeteer:
    name: E2E Puppeteer (headless-new)
    runs-on: ubuntu-latest
    needs: [build, changes]
    if: needs.changes.outputs.code == 'true'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Cache Puppeteer Chrome
        id: puppeteer-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ hashFiles('e2e-tests/puppeteer/package.json', 'pnpm-lock.yaml') }}

      - name: Setup
        uses: ./.github/actions/setup
        with:
          skip-puppeteer-download: 'true'

      - name: Download Build Artifact
        uses: actions/download-artifact@v8
        with:
          name: chaos-maker-dist
          path: packages

      - name: Sync SW bundle into fixtures
        run: node scripts/sync-sw-fixtures.mjs

      - name: Install Puppeteer Chrome
        if: steps.puppeteer-cache.outputs.cache-hit != 'true'
        run: pnpm --filter e2e-tests-puppeteer exec puppeteer browsers install chrome

      - name: Run Puppeteer E2E Tests
        run: pnpm --filter e2e-tests-puppeteer test

  # Single status check that branch protection should require. Aggregates the
  # results of every gating job above so docs-only PRs can skip the e2e
  # matrix without leaving a required check pending. Skipped jobs count as
  # passing — only failure or cancellation marks this red.
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    if: ${{ !cancelled() }}
    needs:
      - changes
      - lint
      - test
      - build
      - docs-build
      - e2e-playwright
      - e2e-cypress
      - e2e-webdriverio
      - e2e-puppeteer
    steps:
      - name: Verify gating jobs succeeded or were skipped
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          echo "$NEEDS" | jq .
          bad=$(echo "$NEEDS" | jq -r 'to_entries[] | select(.value.result != "success" and .value.result != "skipped") | .key')
          if [ -n "$bad" ]; then
            echo "Failing jobs:"
            echo "$bad"
            exit 1
          fi
          echo "All gating jobs passed or were skipped."
