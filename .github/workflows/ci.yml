name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: Lint JS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install Dependencies
        run: pnpm install
      - name: Run ESLint
        run: pnpm lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install Dependencies
        run: pnpm install
      - name: Run Unit Tests
        run: pnpm test

  build:
    name: Build All Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install Dependencies
        run: pnpm install
      - name: Build All Libraries
        run: pnpm build
      - name: Archive Core Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chaos-maker-core-dist
          path: packages/core/dist/
      - name: Archive Playwright Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chaos-maker-playwright-dist
          path: packages/playwright/dist/
      - name: Archive Cypress Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chaos-maker-cypress-dist
          path: packages/cypress/dist/

  e2e-test-playwright:
    name: Playwright Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install Dependencies
        run: pnpm install
      - name: Download Core Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: chaos-maker-core-dist
          path: packages/core/dist/
      - name: Download Playwright Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: chaos-maker-playwright-dist
          path: packages/playwright/dist/
      - name: Install Playwright Browsers
        run: pnpm --filter e2e-tests exec playwright install --with-deps
      - name: Run E2E Tests
        run: pnpm --filter e2e-tests test:playwright

  e2e-test-cypress:
    name: Cypress Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install Dependencies
        run: pnpm install
      - name: Install Cypress Binary
        run: npx cypress install
      - name: Download Core Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: chaos-maker-core-dist
          path: packages/core/dist/
      - name: Download Cypress Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: chaos-maker-cypress-dist
          path: packages/cypress/dist/
      - name: Run Cypress E2E Tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: e2e-tests
          start: pnpm start
          wait-on: 'http://127.0.0.1:8080'
          install: false
